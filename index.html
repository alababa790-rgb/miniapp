<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LP STORE</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

.produit {
    background: #1e293b;
    margin: 20px auto;
    padding: 20px;
    width: 250px;
    border-radius: 10px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.payer {
    background: #22c55e;
    margin-top: 20px;
}
</style>

</head>

<body>

<h1>💎 LP STORE</h1>

<div class="produit">
    <h2>Produit A</h2>
    <p>50 €</p>
    <button onclick="ajouter('Produit A', 50)">Ajouter</button>
</div>

<div class="produit">
    <h2>Produit B</h2>
    <p>70 €</p>
    <button onclick="ajouter('Produit B', 70)">Ajouter</button>
</div>

<button class="payer" onclick="payer()">💰 Payer</button>

<script>
let panier = [];

function ajouter(nom, prix) {
    panier.push({ nom, prix });
    alert(nom + " ajouté !");
}

async function payer() {
    if (panier.length === 0) {
        alert("Panier vide !");
        return;
    }

    await fetch('/payer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ panier })
    });

    alert("Commande envoyée sur Telegram 🔥");
    panier = [];
}
</script>

</body>
</html>
