<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LP STORE</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

/* HEADER */
header {
    background: #020617;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.panier-btn {
    background: #9333ea;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
}

/* PRODUITS */
.container {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 40px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 250px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

/* PANIER PANEL */
.panier {
    position: fixed;
    right: -300px;
    top: 0;
    width: 300px;
    height: 100%;
    background: #020617;
    padding: 20px;
    transition: 0.3s;
    overflow-y: auto;
}

.panier.open {
    right: 0;
}

.item {
    background: #1e293b;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
}

.total {
    margin-top: 20px;
    font-weight: bold;
}

.payer {
    margin-top: 20px;
    background: #22c55e;
    width: 100%;
}
</style>
</head>

<body>

<header>
    <div class="logo">💎 LP STORE</div>
    <div class="panier-btn" onclick="togglePanier()">🛒 <span id="count">0</span></div>
</header>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/250">
        <h3>Produit A</h3>
        <p>50 €</p>
        <button onclick="ajouter('Produit A', 50)">Ajouter</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250">
        <h3>Produit B</h3>
        <p>70 €</p>
        <button onclick="ajouter('Produit B', 70)">Ajouter</button>
    </div>

</div>

<!-- PANIER -->
<div class="panier" id="panier">
    <h2>🛒 Panier</h2>
    <div id="items"></div>
    <div class="total">Total: <span id="total">0</span> €</div>
    <button class="payer" onclick="payer()">💰 Payer</button>
</div>

<script>
let panier = [];

function togglePanier() {
    document.getElementById("panier").classList.toggle("open");
}

function ajouter(nom, prix) {
    panier.push({ nom, prix });
    updatePanier();
}

function supprimer(index) {
    panier.splice(index, 1);
    updatePanier();
}

function updatePanier() {
    document.getElementById("count").innerText = panier.length;

    let itemsDiv = document.getElementById("items");
    itemsDiv.innerHTML = "";

    let total = 0;

    panier.forEach((p, i) => {
        total += p.prix;

        itemsDiv.innerHTML += `
            <div class="item">
                ${p.nom} - ${p.prix}€
                <button onclick="supprimer(${i})">❌</button>
            </div>
        `;
    });

    document.getElementById("total").innerText = total;
}

function payer() {
    if (panier.length === 0) {
        alert("Panier vide !");
        return;
    }

    alert("Commande validée 💰🔥");
    panier = [];
    updatePanier();
}
</script>

</body>
</html>
