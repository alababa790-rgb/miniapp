<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EKIP667 STORE</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* LOGO /
.logo {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    padding: 20px;
    background: linear-gradient(90deg, #9333ea, #3b82f6);
    -webkit-background-clip: text;
    color: transparent;
}

/ PRODUITS /
.container {
    padding: 20px;
}

.produit {
    background: #1e293b;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    transition: 0.3s;
    animation: fadeIn 0.6s ease forwards;
}

.produit:hover {
    transform: scale(1.05);
}

/ BOUTONS /
button {
    background: linear-gradient(90deg, #3b82f6, #9333ea);
    border: none;
    padding: 12px;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #9333ea;
}

/ PANIER /
.panier {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #9333ea;
    padding: 15px 20px;
    border-radius: 50px;
    font-weight: bold;
}

/ ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<h1 class="logo">💎 EKIP667 STORE</h1>

<div class="container">

    <div class="produit">
        <h2>🔥 Produit A</h2>
        <p>50€</p>
        <button onclick="ajouterAuPanier(50)">Ajouter au panier</button>
    </div>

    <div class="produit">
        <h2>🔥 Produit B</h2>
        <p>70€</p>
        <button onclick="ajouterAuPanier(70)">Ajouter au panier</button>
    </div>

</div>

<div class="panier" id="panier">Panier : 0€</div>

<script>
let total = 0;

function ajouterAuPanier(prix) {
    total += prix;
    document.getElementById("panier").innerText = "Panier : " + total + "€";
}
</script>

</body>
</html>
