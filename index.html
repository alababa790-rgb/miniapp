<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LP STORE</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .product {
      background: #1e293b;
      padding: 20px;
      margin: 20px 0;
      border-radius: 10px;
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 10px 20px;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .pay {
      width: 100%;
      background: green;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>💎 LP STORE</h1>

  <div class="product">
    <h2>Produit A</h2>
    <p>50€</p>
    <button onclick="ajouter('Produit A - 50€')">Ajouter</button>
  </div>

  <div class="product">
    <h2>Produit B</h2>
    <p>70€</p>
    <button onclick="ajouter('Produit B - 70€')">Ajouter</button>
  </div>

  <h2 id="panier">Panier : 0€</h2>

  <button class="pay" onclick="payer()">💸 Payer</button>

  <script>
    let total = 0;

    function ajouter(produit) {
      if (produit.includes("50")) total += 50;
      if (produit.includes("70")) total += 70;

      document.getElementById("panier").innerText = "Panier : " + total + "€";
    }

    function payer() {
      fetch('/payer')
        .then(() => {
          alert("Commande envoyée !");
          total = 0;
          document.getElementById("panier").innerText = "Panier : 0€";
        });
    }
  </script>

</body>
</html>
